name: zs_pkg_flutter_ui
description: Shared Flutter component library — design system for mobile
version: 0.1.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.2"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.0
  
  # Offline sync
  powersync: ^1.0.0
  drift: ^2.20.0
  
  # HTTP
  dio: ^5.7.0
  
  # Routing
  go_router: ^13.0.0
  
  # Auth
  flutter_appauth: ^6.0.0
  flutter_secure_storage: ^9.0.0
  
  # Models
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
